name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --group dev --extra test
      - run: uv run pytest tests/unit/ -v --tb=short --junitxml=test-results/backend-unit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-results
          path: test-results/

  backend-integration:
    runs-on: ubuntu-latest
    needs: backend-unit
    if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
    environment: integration
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: langalpha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: langalpha_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://localhost:6379
      SANDBOX_TEST_PROVIDER: daytona
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
      DAYTONA_BASE_URL: ${{ secrets.DAYTONA_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --group dev --extra test
      - run: sudo apt-get install -y ripgrep
      # Skip docker-provider sandbox tests; they need GHCR auth + buildx
      # and are owned by the sandbox-integration workflow's docker tier.
      - run: uv run pytest tests/integration/ -v --tb=short -m integration --ignore=tests/integration/sandbox/providers --junitxml=test-results/backend-integration.xml --sandbox-metrics --sandbox-metrics-file test-results/session_metrics.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-integration-results
          path: test-results/

  hotpath-comment:
    runs-on: ubuntu-latest
    needs: backend-integration
    if: always() && github.event_name == 'pull_request' && needs.backend-integration.result != 'skipped'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: backend-integration-results
          path: test-results/
      - name: Generate hot path comment
        run: python3 scripts/ci/hotpath_comment.py test-results/backend-integration.xml --metrics test-results/session_metrics.json > comment_body.md
      - name: Post sticky PR comment
        if: hashFiles('comment_body.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: hotpath-metrics
          path: comment_body.md

  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm vitest run --reporter=verbose

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend-unit
    # Bound a hung run instead of riding GitHub's 6h default timeout.
    timeout-minutes: 20
    # Official Playwright image ships the browser + system deps pre-installed,
    # pulled from MCR. This removes the `playwright install` download step,
    # whose post-download hang (Chromium fetch reaches 100% then stalls during
    # extraction / next-artifact fetch from cdn.playwright.dev) was hanging CI.
    # KEEP THIS TAG IN SYNC with the @playwright/test version resolved in
    # web/pnpm-lock.yaml (package.json uses a ^ range, so the lockfile is the
    # source of truth). A mismatch makes playwright test fail on a browser/
    # library version error.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
